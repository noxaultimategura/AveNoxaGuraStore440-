<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Noxa Store - Beranda</title>
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ================================================================ */
        /* NOXA STORE - INDEX.HTML                                           */
        /* SERAGAM DENGAN MAPEL & PENDUKUNG                                 */
        /* ================================================================ */

        /* ========== ROOT VARIABLES ========== */
        :root {
            --radius-card: 1.2rem;
            --radius-container: 2rem;
            --shadow-heavy: 0 25px 45px rgba(0, 0, 0, 0.8);
        }

        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            transition: background 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.8s ease;
            color: #FFFFFF;
            background: radial-gradient(circle at 30% 20%, #0d0d1a, #06060d);
            display: flex;
            flex-direction: column;
        }

        /* ========== THEME INDEX (5 Warna) ========== */
        body.theme-primary {
            background: radial-gradient(circle at 30% 20%, #0d0d1a, #06060d);
        }

        body.theme-1 {
            background: radial-gradient(circle at 60% 40%, #1a1a2e, #0d0d1a);
        }

        body.theme-2 {
            background: radial-gradient(circle at 70% 30%, #2a2a4a, #0d0d1a);
        }

        body.theme-3 {
            background: radial-gradient(circle at 40% 70%, #7a7aaa, #1a1a2e);
        }

        body.theme-4 {
            background: radial-gradient(circle at 80% 50%, #4a4a7a, #0d0d1a);
        }

        /* ================================================================ */
        /* APP CONTAINER                                                    */
        /* ================================================================ */

        .app-container {
            max-width: 1800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius-container);
            padding: 1.5rem;
            box-shadow: var(--shadow-heavy);
            border: 1px solid rgba(42, 42, 74, 0.4);
            transition: all 0.8s ease;
            flex: 1;
        }

        /* ================================================================ */
        /* HEADER - TOP BRAND BAR                                           */
        /* ================================================================ */

        .top-brand-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid rgba(42, 42, 74, 0.4);
            padding-bottom: 1rem;
            transition: all 0.8s ease;
        }

        .noxa-store {
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #b0b0d4, #7a7aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            animation: softPulse 2.5s infinite alternate;
        }

        @keyframes softPulse {
            0% {
                opacity: 0.95;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1.02);
            }
        }

        .judul-web-kanan h1 {
            font-size: clamp(1rem, 3.5vw, 1.6rem);
            font-weight: 700;
            background: linear-gradient(120deg, #b0b0d4, #7a7aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: right;
            transition: all 0.8s ease;
        }

        .judul-web-kanan p {
            font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            transition: color 0.8s ease;
        }

        /* ================================================================ */
        /* STATS & SEARCH                                                   */
        /* ================================================================ */

        .top-stats-search {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .total-stats-box {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid rgba(42, 42, 74, 0.4);
            transition: all 0.8s ease;
        }

        .total-stats-box span {
            font-size: clamp(0.65rem, 1.5vw, 0.8rem);
            color: #e0e0f0;
            background: rgba(42, 42, 74, 0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            transition: all 0.8s ease;
        }

        .total-stats-box span strong {
            color: #b0b0d4;
            font-weight: 700;
        }

        /* ====== SEARCH ====== */

        .search-row-flex {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 180px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.7;
        }

        #searchInput {
            width: 100%;
            padding: 0.7rem 2.2rem 0.7rem 2.8rem;
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            color: #e0e0f0;
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid rgba(42, 42, 74, 0.5);
            border-radius: 60px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #searchInput:focus {
            border-color: #b0b0d4;
            box-shadow: 0 0 0 3px rgba(42, 42, 74, 0.3);
        }

        #searchInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #e0e0f0;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ====== BUTTON GROUP ====== */

        .btn-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .btn-refresh-neon {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            font-size: clamp(0.7rem, 1.5vw, 0.8rem);
            font-weight: 600;
            font-family: inherit;
            color: #b0b0d4;
            white-space: nowrap;
            background: rgba(42, 42, 74, 0.3);
            border: 1px solid rgba(42, 42, 74, 0.5);
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-refresh-neon:hover {
            background: rgba(42, 42, 74, 0.5);
            transform: scale(1.02);
            color: #e0e0f0;
        }

        /* ================================================================ */
        /* STATS BAR                                                        */
        /* ================================================================ */

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 1rem;
            margin: 0.5rem 0 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            flex-wrap: wrap;
            gap: 0.4rem;
            border: 1px solid rgba(42, 42, 74, 0.4);
            transition: all 0.8s ease;
        }

        .shortcut-msg {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: clamp(0.55rem, 1.2vw, 0.65rem);
            color: #b0b0d4;
            transition: all 0.8s ease;
        }

        #shortcutNotif {
            min-width: 100px;
            font-size: clamp(0.55rem, 1.2vw, 0.65rem);
            text-align: center;
            opacity: 0.8;
            color: #b0b0d4;
        }

        /* ================================================================ */
        /* GRID MATERI - SERAGAM DENGAN MAPEL                              */
        /* ================================================================ */

        #materiContainer {
            display: grid;
            gap: 1.5rem;
            margin-top: 1.5rem;
            grid-template-columns: repeat(4, 1fr);
        }

        /* ================================================================ */
        /* CARD MATERI - BESAR & PROPORSIONAL                               */
        /* ================================================================ */

        .materi-card {
            border-radius: var(--radius-card);
            padding: 1.8rem 1.2rem 1.5rem;
            transition: all 0.5s ease;
            border: 1px solid rgba(42, 42, 74, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.6rem;
            text-decoration: none;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            min-height: 240px;
            position: relative;
            overflow: hidden;
            justify-content: center;
        }

        .materi-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.5);
        }

        .materi-card.gradien-0 {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.5));
        }

        .materi-card.gradien-1 {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.6));
        }

        .materi-card.gradien-2 {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.4));
        }

        .materi-card.gradien-3 {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.45));
        }

        .materi-card.gradien-4 {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(0, 0, 0, 0.35));
        }

        /* ================================================================ */
        /* STATUS BADGE                                                     */
        /* ================================================================ */

        .status-badge {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: clamp(0.55rem, 0.8vw, 0.7rem);
            line-height: 1.2;
            padding: 0.2rem 0.7rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-weight: 600;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .status-badge.active {
            background: rgba(46, 204, 113, 0.2);
            color: #2ECC71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .status-badge.coming {
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }

        /* ================================================================ */
        /* CARD CONTENT                                                     */
        /* ================================================================ */

        .card-icon {
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            margin-top: 0.2rem;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            min-height: 2.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
            padding-right: 0.5rem;
            position: relative;
            z-index: 1;
            color: #e0e0f0;
        }

        .card-desc {
            font-size: clamp(0.6rem, 1vw, 0.8rem);
            opacity: 0.7;
            font-weight: 400;
            position: relative;
            z-index: 1;
            color: #7a7aaa;
        }

        /* ================================================================ */
        /* BUTTON ENTER - BESAR                                             */
        /* ================================================================ */

        .btn-enter {
            width: 80%;
            max-width: 250px;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            text-align: center;
            transition: all 0.25s ease;
            display: inline-block;
            border: none;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.2rem;
            position: relative;
            z-index: 1;
        }

        .btn-enter:not([disabled]) {
            background: linear-gradient(135deg, #4a4a7a, #7a7aaa);
            color: #e0e0f0;
            box-shadow: 0 2px 6px rgba(42, 42, 74, 0.4);
        }

        .btn-enter:not([disabled]):hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 74, 122, 0.5);
            background: linear-gradient(135deg, #7a7aaa, #b0b0d4);
        }

        .btn-enter[disabled] {
            background: rgba(42, 42, 74, 0.4);
            color: #4a4a7a;
            border: 1px solid rgba(42, 42, 74, 0.3);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-enter[disabled]:hover {
            transform: none;
        }

        /* ================================================================ */
        /* CARD STATUS - COMING SOON (PUDAR)                                */
        /* ================================================================ */

        .materi-card.status-1 {
            opacity: 0.7;
            filter: grayscale(0.3);
        }

        .materi-card.status-1:hover {
            transform: translateY(-3px) scale(1.01);
            opacity: 0.8;
        }

        .materi-card.status-1 .card-title {
            color: #7a7aaa;
        }

        /* ================================================================ */
        /* CARD STATUS - HIDDEN (TIDAK TAMPIL)                              */
        /* ================================================================ */

        .materi-card.status-0 {
            display: none !important;
        }

        /* ================================================================ */
        /* NO RESULT & EMPTY STATE                                          */
        /* ================================================================ */

        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: #b0b0d4;
            background: rgba(0, 0, 0, 0.7);
            border-radius: var(--radius-card);
            margin-top: 1.5rem;
            border: 1px solid rgba(42, 42, 74, 0.5);
        }

        .no-result span {
            color: #7a7aaa;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: var(--radius-card);
            border: 1px solid rgba(42, 42, 74, 0.3);
        }

        /* ================================================================ */
        /* SUB MENU INDICATOR                                               */
        /* ================================================================ */

        .sub-menu-indicator {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .sub-menu-indicator span {
            font-size: 0.6rem;
            color: #4a4a7a;
            background: rgba(42, 42, 74, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(42, 42, 74, 0.2);
            transition: all 0.3s ease;
        }

        .sub-menu-indicator span:hover {
            background: rgba(42, 42, 74, 0.4);
            color: #b0b0d4;
            cursor: default;
        }

        /* ================================================================ */
        /* SCROLLBAR                                                        */
        /* ================================================================ */

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #06060d;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a1a2e;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b0b0d4;
        }

        /* ================================================================ */
        /* FOOTER                                                           */
        /* ================================================================ */

        .footer {
            max-width: 1800px;
            margin: 1.5rem auto 0;
            padding: 1.5rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(42, 42, 74, 0.4);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(42, 42, 74, 0.3);
            transition: all 0.3s ease;
        }

        .footer p {
            color: #7a7aaa;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }

        .footer .footer-brand {
            color: #b0b0d4;
            font-weight: 700;
            background: linear-gradient(135deg, #b0b0d4, #7a7aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .footer .footer-heart {
            color: #4a4a7a;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        .footer .footer-divider {
            color: #2a2a4a;
            margin: 0 0.5rem;
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .footer-social a {
            color: #7a7aaa;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(42, 42, 74, 0.2);
            border: 1px solid rgba(42, 42, 74, 0.3);
        }

        .footer-social a:hover {
            transform: translateY(-4px) scale(1.1);
            color: #e0e0f0;
            border-color: #b0b0d4;
            box-shadow: 0 0 20px rgba(74, 74, 122, 0.3);
        }

        .footer-social a:hover .fa-tiktok {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .footer-social a:hover .fa-whatsapp {
            color: #25D366;
            text-shadow: 0 0 20px rgba(37, 211, 102, 0.3);
        }

        .footer-social a:hover .fa-instagram {
            color: #E4405F;
            text-shadow: 0 0 20px rgba(228, 64, 95, 0.3);
        }

        /* ================================================================ */
        /* RESPONSIVE - SERAGAM DENGAN MAPEL & PENDUKUNG                   */
        /* ================================================================ */

        /* HP Kecil Potrait (<= 420px) */
        @media (max-width: 420px) {
            body {
                padding: 0.5rem;
            }

            .app-container {
                padding: 0.6rem;
                border-radius: 0.8rem;
                width: 100%;
            }

            .top-brand-bar {
                flex-direction: column;
                text-align: center;
                gap: 0.3rem;
            }

            .judul-web-kanan h1 {
                text-align: center;
                font-size: 0.75rem;
            }

            .judul-web-kanan p {
                text-align: center;
                font-size: 0.6rem;
            }

            .top-stats-search {
                flex-direction: column;
                align-items: stretch;
            }

            .total-stats-box {
                justify-content: center;
                flex-wrap: wrap;
            }

            .total-stats-box span {
                font-size: 0.55rem;
                padding: 0.15rem 0.4rem;
            }

            .search-row-flex {
                flex-direction: column;
                align-items: stretch;
            }

            .search-wrapper {
                width: 100%;
            }

            .btn-group {
                width: 100%;
                flex-direction: row;
            }

            .btn-refresh-neon {
                flex: 1;
                justify-content: center;
                padding: 0.6rem 0.8rem;
                font-size: 0.7rem;
            }

            .stats-bar {
                flex-direction: column;
                text-align: center;
                padding: 0.6rem;
                gap: 0.3rem;
            }

            .shortcut-msg {
                display: none !important;
            }

            #shortcutNotif {
                min-width: auto;
                font-size: 0.5rem;
            }

            #materiContainer {
                grid-template-columns: 1fr !important;
                gap: 0.8rem;
            }

            .materi-card {
                padding: 1rem 0.8rem;
                min-height: 180px;
            }

            .status-badge {
                top: 5px;
                right: 6px;
                font-size: 0.5rem;
                padding: 0.1rem 0.4rem;
            }

            .card-title {
                font-size: 0.9rem;
                min-height: 2.2rem;
            }

            .card-desc {
                font-size: 0.55rem;
            }

            .btn-enter {
                width: 100%;
                padding: 0.5rem 0.8rem;
                font-size: 0.7rem;
            }

            .footer {
                padding: 0.6rem 0.8rem;
                width: 100%;
                border-radius: 0.8rem;
                margin-top: 0.6rem;
            }

            .footer p {
                font-size: 0.6rem;
            }

            .footer-social a {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }

            .footer-social {
                gap: 0.5rem;
            }
        }

        /* HP Kecil Landscape (421px - 575px) */
        @media (min-width: 421px) and (max-width: 575px) {
            body {
                padding: 0.6rem;
            }

            .app-container {
                padding: 0.8rem;
                border-radius: 1rem;
                width: 100%;
            }

            .top-brand-bar {
                flex-direction: column;
                text-align: center;
                gap: 0.3rem;
            }

            .judul-web-kanan h1 {
                text-align: center;
                font-size: 0.8rem;
            }

            .judul-web-kanan p {
                text-align: center;
                font-size: 0.6rem;
            }

            .top-stats-search {
                flex-direction: column;
                align-items: stretch;
            }

            .search-row-flex {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .btn-group {
                flex: 1;
            }

            .btn-refresh-neon {
                flex: 1;
                justify-content: center;
                padding: 0.5rem 0.6rem;
                font-size: 0.65rem;
            }

            .stats-bar {
                flex-direction: column;
                text-align: center;
                padding: 0.5rem;
                gap: 0.3rem;
            }

            .shortcut-msg {
                display: none !important;
            }

            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearchBtn');
            const refreshBtn = document.getElementById('refreshButton');
            const shortcutNotifSpan = document.getElementById('shortcutNotif');
            const resultCounterSpan = document.getElementById('resultCounter');
            const noResultDiv = document.getElementById('noResultMessage');
            const subMenuIndicator = document.getElementById('subMenuIndicator');

            // ================================================================ */
            // COLOR THEMES (5 Warna)                                            */
            // ================================================================ */

            const colorThemes = ['theme-primary', 'theme-1', 'theme-2', 'theme-3', 'theme-4'];
            let currentThemeIndex = 0;

            function applyNextTheme() {
                if (!bodyEl) return;
                colorThemes.forEach(theme => bodyEl.classList.remove(theme));
                currentThemeIndex = (currentThemeIndex + 1) % colorThemes.length;
                bodyEl.classList.add(colorThemes[currentThemeIndex]);
            }

            setInterval(applyNextTheme, 5000);

            // ================================================================ */
            // GRADIENT ROTATION (5 Gradien)                                    */
            // ================================================================ */

            const gradienList = ['gradien-0', 'gradien-1', 'gradien-2', 'gradien-3', 'gradien-4'];
            let gradienIndex = 0;

            function rotateGradient() {
                const cards = document.querySelectorAll('.materi-card:not(.status-0)');
                if (cards.length === 0) return;
                gradienIndex = (gradienIndex + 1) % gradienList.length;
                cards.forEach(card => {
                    gradienList.forEach(gc => card.classList.remove(gc));
                    card.classList.add(gradienList[gradienIndex]);
                });
            }

            setInterval(rotateGradient, 3000);

            // ================================================================ */
            // RENDER MENU                                                       */
            // ================================================================ */

            function renderMenu() {
                const searchTerm = searchInput ? searchInput.value.trim().toLowerCase() : '';
                let visibleCount = 0;
                let activeCount = 0;
                let comingCount = 0;
                let hiddenCount = 0;

                const visibleMenus = menuData.filter(item => item.status !== 0);

                menuData.forEach(item => {
                    if (item.status === 2) activeCount++;
                    else if (item.status === 1) comingCount++;
                    else if (item.status === 0) hiddenCount++;
                });

                document.getElementById('totalMateriCount').innerText = menuData.length;
                document.getElementById('materiSudahAda').innerText = activeCount;
                document.getElementById('materiComingSoon').innerText = comingCount;
                document.getElementById('materiHidden').innerText = hiddenCount;

                let cardsHTML = '';
                visibleMenus.forEach((item, index) => {
                    const isMatch = searchTerm === '' ||
                        item.title.toLowerCase().includes(searchTerm) ||
                        item.desc.toLowerCase().includes(searchTerm);

                    if (isMatch) visibleCount++;

                    const statusClass = item.status === 1 ? 'status-1' : 'status-2';
                    const statusBadge = item.status === 1 ?
                        '<span class="status-badge coming">⏳ Coming Soon</span>' :
                        '<span class="status-badge active">✅ Aktif</span>';
                    const buttonText = item.status === 1 ? '⏳ Segera' : '🚪 Masuk';
                    const displayStyle = isMatch ? '' : 'style="display:none;"';
                    const linkHref = item.status === 2 ? item.href : '#';
                    const delay = (index % 6) * 0.06;

                    cardsHTML += `
                        <a href="${linkHref}" 
                           class="materi-card ${statusClass} gradien-${index % gradienList.length}" 
                           data-id="${item.id}"
                           data-status="${item.status}"
                           data-title="${item.title}"
                           data-desc="${item.desc}"
                           style="animation-delay: ${delay}s; ${displayStyle}"
                           ${item.status === 1 ? 'onclick="return false;"' : ''}>
                            ${statusBadge}
                            <div class="card-icon">${item.icon}</div>
                            <h3 class="card-title">${item.title}</h3>
                            <div class="card-desc">${item.desc}</div>
                            <button class="btn-enter" ${item.status === 1 ? 'disabled' : ''}>${buttonText}</button>
                        </a>
                    `;
                });

                materiContainer.innerHTML = cardsHTML;

                let subHTML = '';
                visibleMenus.forEach(item => {
                    const emoji = item.status === 2 ? '✅' : '⏳';
                    subHTML += `<span>${emoji} ${item.title}</span>`;
                });
                subMenuIndicator.innerHTML = subHTML;

                if (resultCounterSpan) {
                    if (searchTerm !== '' && visibleCount === 0) {
                        resultCounterSpan.innerHTML = '❌ Menu tidak ditemukan';
                        resultCounterSpan.style.color = '#b0b0d4';
                        noResultDiv.style.display = 'block';
                    } else {
                        resultCounterSpan.innerHTML = searchTerm !== '' ?
                            `✨ Ditemukan ${visibleCount} menu` :
                            `📚 ${visibleCount} menu tersedia`;
                        resultCounterSpan.style.color = '#e0e0f0';
                        noResultDiv.style.display = 'none';
                    }
                }

                document.querySelectorAll('.materi-card.status-1').forEach(card => {
                    card.addEventListener('click', function (e) {
                        e.preventDefault();
                        if (shortcutNotifSpan) {
                            shortcutNotifSpan.innerText = '⏳ Menu ini masih dalam pengembangan!';
                            setTimeout(() => shortcutNotifSpan.innerText = '', 2000);
                        }
                    });
                });

                return visibleCount;
            }

            // ================================================================ */
            // FILTER FUNGSI                                                     */
            // ================================================================ */

            function filterMateri() {
                const searchTerm = searchInput ? searchInput.value.trim().toLowerCase() : '';
                const cards = document.querySelectorAll('.materi-card');
                let visibleCount = 0;

                cards.forEach(card => {
                    const title = card.dataset.title || '';
                    const desc = card.dataset.desc || '';
                    const isMatch = searchTerm === '' ||
                        title.toLowerCase().includes(searchTerm) ||
                        desc.toLowerCase().includes(searchTerm);

                    card.style.display = isMatch ? '' : 'none';
                    if (isMatch) visibleCount++;
                });

                if (resultCounterSpan) {
                    if (searchTerm !== '' && visibleCount === 0) {
                        resultCounterSpan.innerHTML = '❌ Menu tidak ditemukan';
                        resultCounterSpan.style.color = '#b0b0d4';
                        noResultDiv.style.display = 'block';
                    } else {
                        resultCounterSpan.innerHTML = searchTerm !== '' ?
                            `✨ Ditemukan ${visibleCount} menu` :
                            `📚 ${visibleCount} menu tersedia`;
                        resultCounterSpan.style.color = '#e0e0f0';
                        noResultDiv.style.display = 'none';
                    }
                }
            }

            // ================================================================ */
            // SEARCH EVENTS                                                     */
            // ================================================================ */

            let debounceTimer;
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(filterMateri, 200);
                });
            }

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    if (searchInput) searchInput.value = '';
                    filterMateri();
                    if (searchInput) searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⌨️ Pencarian dihapus';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                    }
                });
            }

            // ================================================================ */
            // KEYBOARD SHORTCUTS                                                */
            // ================================================================ */

            window.addEventListener('keydown', (e) => {
                if (!searchInput) return;
                const isDesktop = window.innerWidth >= 992;
                if (!isDesktop) return;

                if ((e.ctrlKey && e.key === 'k') || (e.ctrlKey && e.key === 'K')) {
                    e.preventDefault();
                    searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '🔎 Ctrl+K fokus pencarian';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1500);
                    }
                }

                if (e.shiftKey && (e.key === 'F' || e.key === 'f')) {
                    e.preventDefault();
                    searchInput.focus();
                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⚡ Shift+F fokus';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1500);
                    }
                }

                if (e.key === 'Escape') {
                    if (searchInput.value !== '') {
                        searchInput.value = '';
                        filterMateri();
                        if (shortcutNotifSpan) {
                            shortcutNotifSpan.innerText = '⌨️ Pencarian dibersihkan (ESC)';
                            setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                        }
                    } else {
                        searchInput.blur();
                    }
                }
            });

            // ================================================================ */
            // REFRESH                                                          */
            // ================================================================ */

            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    if (searchInput) searchInput.value = '';
                    renderMenu();

                    const refreshIcon = refreshBtn.querySelector('span');
                    if (refreshIcon) {
                        refreshIcon.style.animation = 'spin 0.5s ease';
                        setTimeout(() => {
                            refreshIcon.style.animation = '';
                        }, 500);
                    }

                    if (shortcutNotifSpan) {
                        shortcutNotifSpan.innerText = '⟳ Halaman disegarkan';
                        setTimeout(() => shortcutNotifSpan.innerText = '', 1200);
                    }

                    document.querySelectorAll('.materi-card').forEach(card => {
                        card.style.transform = 'scale(0.98)';
                        setTimeout(() => {
                            card.style.transform = '';
                        }, 200);
                    });
                });
            }

            // ================================================================ */
            // SPIN KEYFRAME                                                     */
            // ================================================================ */

            if (!document.querySelector('#refreshSpinKeyframe')) {
                const spinStyle = document.createElement('style');
                spinStyle.id = 'refreshSpinKeyframe';
                spinStyle.textContent =
                    `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
                document.head.appendChild(spinStyle);
            }

            // ================================================================ */
            // FOOTER YEAR                                                       */
            // ================================================================ */

            const footerYearEl = document.getElementById('footerYear');
            if (footerYearEl) {
                footerYearEl.textContent = new Date().getFullYear();
            }

            // ================================================================ */
            // INIT                                                              */
            // ================================================================ */

            renderMenu();

            console.log('✅ Noxa Store | Index - 6 Menu Utama');
            console.log('📊 Status Menu:');
            menuData.forEach(item => {
                const statusText = item.status === 2 ? '✅ Aktif' :
                    item.status === 1 ? '⏳ Coming Soon' : '⏸️ Hidden';
                console.log(`   ${item.id}. ${item.title} → ${statusText}`);
            });
            console.log('💡 Ubah status di variable menuData (0=hidden, 1=coming soon, 2=aktif)');

            // ================================================================ */
            // CLICK CARD HANDLER                                                */
            // ================================================================ */

            document.addEventListener('click', function (e) {
                const card = e.target.closest('.materi-card');
                if (card && !e.target.closest('.btn-enter') && !e.target.closest('a')) {
                    const title = card.dataset.title || 'Menu';
                    const status = parseInt(card.dataset.status);

                    if (status === 2) {
                        const link = card.querySelector('a');
                        if (link && link.href && link.href !== '#' && link.href !== '#!') {
                            window.open(link.href, '_blank');
                            if (shortcutNotifSpan) {
                                shortcutNotifSpan.innerText = '🔗 Membuka: ' + title;
                                setTimeout(() => shortcutNotifSpan.innerText = '', 2000);
                            }
                        }
                    } else if (status === 1) {
                        if (shortcutNotifSpan) {
                            shortcutNotifSpan.innerText = '⏳ "' + title + '" masih dalam pengembangan!';
                            setTimeout(() => shortcutNotifSpan.innerText = '', 2000);
                        }
                    }
                }
            });

            document.addEventListener('click', function (e) {
                const btn = e.target.closest('.btn-enter');
                if (btn && !btn.disabled) {
                    const card = btn.closest('.materi-card');
                    if (card) {
                        const link = card.querySelector('a');
                        if (link && link.href && link.href !== '#' && link.href !== '#!') {
                            window.open(link.href, '_blank');
                            if (shortcutNotifSpan) {
                                const title = card.dataset.title || 'Menu';
                                shortcutNotifSpan.innerText = '🔗 Membuka: ' + title;
                                setTimeout(() => shortcutNotifSpan.innerText = '', 2000);
                            }
                        }
                    }
                }
            });

        })();
    </script>
</body>
